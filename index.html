        const fixedGuides = [
            { tag: "大阪 // 歷史", title: "大阪城", map: "https://maps.app.goo.gl/gctZ6jE3D4bXpbyK9", desc: "日本三名城之一，天守閣內展示大量豐臣秀吉歷史文物。護城河及巨石城牆非常壯觀。\n● 玩法：搭乘電梯或步行上天守閣展望台鳥瞰大阪市區景致。\n● 建議花費：純逛公園免費；天守閣門票 ¥600。", tip: "💡 注意：天守閣下午 4:30 停止入場，建議提早抵達。" },
            { tag: "大阪 // 動漫打卡", title: "名偵探柯南銅像 (Detective Conan Bronze Statue)", map: "https://maps.app.goo.gl/r5JjBH8jMatdjm5V8", desc: "位於讀賣電視台大樓前方，有柯南、少年偵探團以及毛利小五郎的精緻青銅雕像，是柯南迷必朝聖打卡點！\n● 玩法：與柯南擺出經典的『真相只有一個』姿勢合照。\n● 建議花費：免費參觀。", tip: "💡 小撇步：電視台內部一樓大廳偶爾也有動漫相關佈置，可以順道入內探訪。" },
            { tag: "大阪 // 購物天堂", title: "心齋橋筋商店街", map: "https://maps.app.goo.gl/N8wN9vBvA6ZkWXGv8", desc: "大阪最代表性的長形拱廊商店街，聚集各大藥妝店、UNIQLO、GU 以及各式潮流服飾與小吃。\n● 玩法：瘋狂貨比三家買藥妝，記得準備好優惠券與護照辦理免稅。\n● 建議花費：依個人購物預算而定，藥妝消費滿 ¥5000 可免稅。", tip: "💡 提示：下午至晚上人潮極度擁擠，顧好隨身財物。" },
            { tag: "大阪 // 經典地標", title: "道頓堀固力果跑跑人 (Glico Sign)", map: "https://maps.app.goo.gl/N6V6b7v6mZwkWmX9A", desc: "戎橋旁的巨大固力果跑跑人看板是大阪的代名詞，周邊滿是立體誇張招牌（蟹道樂、章魚燒）。\n● 玩法：在戎橋上與跑跑人單腳舉手合影，並品嚐章魚燒與大阪燒。\n● 建議花費：街區免費；小吃每份約 ¥600 - ¥1000。", tip: "💡 最佳拍照點：過橋到河岸下方走道，由下往上拍人像最不容易被路人擋住。" },
            { tag: "京都 // 神社", title: "伏見稻荷大社", map: "https://maps.app.goo.gl/B4V4v7m7mZwkWm6A8", desc: "以漫延整座山頭的「千本鳥居」聞名，供奉商業與農業之神狐狸使者。\n● 玩法：沿著紅色鳥居隧道步行慢遊，購買狐狸繪馬寫下心願。\n● 建議花費：免費入內。", tip: "💡 注意事項：想拍空景務必像我們一樣排在 8:30 前抵達，否則人潮會非常驚人！" },
            { tag: "京都 // 美食廚房", title: "錦市場", map: "https://maps.app.goo.gl/C6b7b7v6mZwkWm7A9", desc: "擁有數百年歷史的傳統市場，街道上方有彩色玻璃頂棚，齊聚上百家京料理食材與特色小吃店。\n● 綜合玩法：邊走邊看（但不可邊走邊吃！要站在店家規定區域吃完），必吃豆乳甜甜圈、章魚鵪鶉蛋串、現烤海鮮。\n● 建議花費：小吃每樣 ¥300 - ¥800 不等。", tip: "💡 提醒：這裡嚴禁邊走邊吃，垃圾請直接丟在購買店家的垃圾桶中。" },
            { tag: "京都 // 世界遺產", title: "清水寺", map: "https://maps.app.goo.gl/D7v7v7m7mZwkWm8B9", desc: "京都最古老的寺院，全殿不費一根釘子、全木造的「清水舞台」懸空建於懸崖上，極其震撼。\n● 玩法：參拜大殿、至音羽瀑布飲用泉水（健康、學業、戀愛三選一），隨後順遊二三年坂古街。\n● 建議花費：門票 ¥400。", tip: "💡 散策提示：沿途石階梯較多，務必穿著最好走的鞋子。" },
            { tag: "京都 // 傳統街廓", title: "祇園", map: "https://maps.app.goo.gl/E8v7v7m7mZwkWm9C9", desc: "京都最具代表性的花街，以傳統木造格子窗建築「町家」為特色，充滿濃濃的江戶風情。\n● 玩法：黃昏時分漫步，感受古都華燈初上的神祕浪漫氛圍。\n● 建議花費：免費散步。", tip: "💡 規記：請勿任意拉扯或強行拍攝路過的藝妓，保持禮貌距離。" },
            { tag: "京都 // 花街小巷", title: "花見小路通", map: "https://maps.app.goo.gl/F9v7v7m7mZwkWmAD9", desc: "祇園精華區域，街道由石板鋪成，兩旁盡是高級料亭與茶屋，是京都高檔文化的象徵。\n● 玩法：欣賞傳統高雅的日式建築門面，體驗靜謐的歷史感。\n● 建議花費：免門票；若在此用餐費用極高。", tip: "💡 嚴格禁止：部分私人巷弄有禁止拍照告示，違者會罰款 ¥10000，請復加留意路標！" },
            { tag: "大阪 // 夢幻樂園", title: "日本環球影城 (USJ)", map: "https://maps.app.goo.gl/G7v7v7m7mZwkWmBE9", desc: "世界級主題樂園！最新「超級任天堂世界」與經典「哈利波特」是必衝園區。\n● 核心玩法：開園立刻衝任天堂園區保證入園，或提前買好快速通關。必玩馬利歐賽車與禁忌之旅。\n● 建議花費：門票約 ¥8600 - ¥10400 (依日期波動)。", tip: "💡 超重要：出發前務必下載 USJ 官方 APP，進園第一時間搶當天熱門園區的保存券 (整理券)。" },
            { tag: "條拉 // 野生互動", title: "奈良公園", map: "https://maps.app.goo.gl/H8v7v7m7mZwkWmCF9", desc: "擁有上千隻野生梅花鹿的巨大自然公園，這裡的鹿被視為神的使者，聰明且熱情。\n● 玩法：向攤販購買鹿仙貝，對小鹿點頭敬禮，牠們也會對你鞠躬回禮喔！\n● 建議花費：公園免費；鹿仙貝每份 ¥200。", tip: "💡 警告：若手上拿著仙貝卻故意不給，可能會被鹿頂撞、咬衣服或撞屁股，請速戰速決！" },
            { tag: "奈良 // 木造之巔", title: "東大寺 (Tōdai-ji)", map: "https://maps.app.goo.gl/I9v7v7m7mZwkWmDG9", desc: "距今千年以上歷史，其大佛殿為全世界現存最大的木造建築，殿內高達 15 公尺的盧舍那大佛令人屏息。\n● 玩法：參拜大佛，並嘗試挑戰穿過殿內柱子底部的「大佛鼻孔」巨洞（傳說穿過能保平安）。\n● 建議花費：大佛殿門票 ¥600。", tip: "💡 提示：東大寺外圍的鹿群相對溫和，適合合照。" },
            { tag: "大阪 // 復古老街", title: "通天閣 & 新世界", map: "https://maps.app.goo.gl/J9v7v7m7mZwkWmEH9", desc: "充滿昭和復古感的老街區，通天閣頂端有幸運之神 Billiken 雕像，近年新增了刺激的巨型透明滑梯。\n● 玩法：拍下街區華麗誇張的河豚大燈籠，上通天閣俯瞰，晚餐吃在地著名的元祖串炸。\n● 建議花費：通天閣展望台 ¥900；巨型溜滑梯體驗 ¥1000。", tip: "💡 小建議：通天閣塔頂溜滑梯速度極快、非常刺激，心臟病或易頭暈者請衡量。" },
            { tag: "神戶 // 港灣浪漫", title: "馬賽克摩天輪 (Mosaic Ferris Wheel)", map: "https://maps.app.goo.gl/K9v7v7m7mZwkWmFI9", desc: "位於神戶港港灣人工島 Mosaic 廣場旁，隨著大摩天輪緩緩上升，神戶港、六甲山與明石海峽大橋的立體夜景盡收眼底。\n● 玩法：情侶約會必排，夜晚車廂會有繽紛的發光動畫，從車廂拍向神戶港塔視角絕佳。\n● 建議花費：摩天輪搭乘費 ¥800/人。", tip: "💡 拍點：摩天輪下方也是拍攝神戶港夜景建築群的一線極佳角度。" },
            { tag: "神戶 // 地標建築", title: "神戶港塔 (Kobe Port Tower)", map: "https://maps.app.goo.gl/L9v7v7m7mZwkWmGJ9", desc: "世界首創管狀網目結構的紅高塔，被譽為「鋼鐵美女」。設有高空透明步道與 360 度旋轉咖啡廳。\n● 玩法：在港邊拍攝其與海洋博物館交織的絢麗燈光秀，亦可購票上塔觀景。\n● 建議花費：純外觀欣賞免費；登塔展望層門票約 ¥1000。", tip: "💡 亮點：神戶港塔夜間點燈非常唯美，是神戶最著名的地標風景。" },
            { tag: "神戶 // 世界遺產", title: "姬路城 (白鷺城)", map: "https://maps.app.goo.gl/M9v7v7m7mZwkWmHK9", desc: "日本保存最完好的江戶時代城郭，由於外牆通體雪白，形態優美如白鷺展翅，為日本第一國寶。\n● 玩法：沿著迂迴防禦城道登天守閣，欣賞全木造卡榫樑柱結構，極致震撼。\n● 建議花費：門票 ¥1000。", tip: "💡 備註：從神戶三宮搭乘火車前往約 40-50 分鐘，大天守閣內樓梯極陡，需脫鞋攀爬。" },
            { tag: "神戶 // 洋式購物", title: "元町商店街 & 南京町", map: "https://maps.app.goo.gl/N9v7v7m7mZwkWmIL9", desc: "元町商店街林立眾多百年歐風老店與咖啡廳，質感沉穩；緊鄰的「南京町」則是關西著名中華街。\n● 玩法：在元町喝下午茶買神戶風月堂洋菓子，再去南京町吃老祥記豚饅。\n● 建議花費：小吃零錢價約 ¥200 - ¥500。", tip: "💡 提示：南京町假日人潮洶湧，購買排隊名店小吃要有排隊心理準備。" },
            { tag: "神戶 // 異國風情", title: "神戶北野異人館街", map: "https://maps.app.goo.gl/O9v7v7m7mZwkWmJM9", desc: "明治開港時期外國領事與商人的精緻洋房聚落，依山而建，街道充滿歐洲小鎮風情。\n● 玩法：漫步斜坡古街，參觀指標性的「風見雞館」與「萌黃之館」，並朝盛全日本最美的星巴克北野異人館店。\n● 建議花費：街區散步免費；部分異人館內部參觀門票 ¥300 - ¥500 不等。", tip: "💡 穿著：整區都是連續陡坡，請務必著舒適好走的運動鞋。" },
            { tag: "神戶 // 百萬夜景", title: "摩耶山掬星台", map: "https://maps.app.goo.gl/P9v7v7m7mZwkWmKN9", desc: "日本三大夜景之一！意指這裡的夜景璀璨閃耀，猶如「用手即可舀起漫天繁星」般夢幻。\n● 玩法：搭乘摩耶登山纜車與高空纜車 (Maya Viewline) 攻頂，眺望整個大阪灣無敵星河夜景。\n● 建議花費：纜車來回票約 ¥1560。", tip: "💡 重大警告：山上體感溫度比平地低 5-10 度，即使是 6 月夜晚也**非常寒冷、風極大**，務必攜帶防風外套！並注意下山末班纜車時間。" }

        // 🔐 【核心身分驗證處理】

        onAuthStateChanged(auth, async (user) => {
            const overlay = document.getElementById("login-overlay");
            if (user) {
                currentUid = user.uid;
                overlay.classList.add("hidden");
                
                document.getElementById("current-user-name").innerText = user.displayName || user.email.split('@')[0];
                if (user.photoURL) {
                    document.getElementById("current-user-avatar").src = user.photoURL;
                }
                
                initAppContentModules();
            } else {
                currentUid = null;
                overlay.classList.remove("hidden");
            }
        });

        window.toggleAuthMode = function(mode) {
            const tabSignin = document.getElementById("btn-tab-signin");
            const tabSignup = document.getElementById("btn-tab-signup");
            const formSignin = document.getElementById("form-signin");
            const formSignup = document.getElementById("form-signup");
            
            if (mode === 'signin') {
                formSignin.classList.remove("hidden");
                formSignup.classList.add("hidden");
                tabSignin.className = "w-1/2 py-2 rounded-lg text-center text-xs font-bold bg-white text-slate-700 shadow-xs";
                tabSignup.className = "w-1/2 py-2 rounded-lg text-center text-xs font-semibold text-slate-400";
            } else {
                formSignin.classList.add("hidden");
                formSignup.classList.remove("hidden");
                tabSignin.className = "w-1/2 py-2 rounded-lg text-center text-xs font-semibold text-slate-400";
                tabSignup.className = "w-1/2 py-2 rounded-lg text-center text-xs font-bold bg-white text-slate-700 shadow-xs";
            }
        };

        window.handleSignIn = function() {
            const email = document.getElementById("signin-email").value.trim();
            const password = document.getElementById("signin-password").value;
            if(!email || !password) return alert("請完整輸入信箱與密碼！");
            
            signInWithEmailAndPassword(auth, email, password)
                .catch(err => alert("身分驗證失敗: " + err.message));
        };

        window.handleSignUp = function() {
            const email = document.getElementById("signup-email").value.trim();
            const password = document.getElementById("signup-password").value;
            const name = document.getElementById("signup-name").value.trim();
            
            if(!email || !password || !name) return alert("請填妥所有註冊欄位！");
            if(password.length < 6) return alert("基於安全性，密碼長度至少需 6 碼！");
            
            createUserWithEmailAndPassword(auth, email, password)
                .then(async (userCredential) => {
                    const user = userCredential.user;
                    let profileData = { displayName: name };
                    if (base64Avatar) profileData.photoURL = base64Avatar;
                    
                    await updateProfile(user, profileData);
                    alert("旅伴成員註冊成功！已自動登入。");
                    location.reload();
                })
                .catch(err => alert("註冊失敗: " + err.message));
        };

        window.handleSignOut = function() {
            if(confirm("確定要登出此裝置的指南同步驗證嗎？")) {
                signOut(auth).then(() => location.reload());
            }
        };

        window.processAndPreviewAvatar = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                base64Avatar = e.target.result;
                const img = document.getElementById("new-avatar-preview");
                img.src = base64Avatar;
                img.classList.remove("hidden");
                document.getElementById("new-avatar-icon").classList.add("hidden");
            };
            reader.readAsDataURL(file);
        };

        // ==========================================
        // 📱 【分頁與頁面控制切換邏輯】
        // ==========================================
        window.switchTab = function(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`sec-${tabId}`).classList.remove('hidden');
            
            document.querySelectorAll('nav button').forEach(el => {
                el.classList.remove('text-emerald-500');
                el.classList.add('text-slate-400');
            });
            const activeNav = document.getElementById(`nav-${tabId}`);
            if(activeNav) {
                activeNav.classList.remove('text-slate-400');
                activeNav.classList.add('text-emerald-500');
            }
        };

        window.switchListTab = function(subTab) {
            currentListTab = subTab;
            if (subTab === 'carry') {
                document.getElementById('list-container-carry').classList.remove('hidden');
                document.getElementById('list-container-check').classList.add('hidden');
                document.getElementById('list-tab-carry').className = "w-1/2 py-1.5 rounded-lg text-center text-xs font-bold bg-emerald-400 text-white shadow-xs";
                document.getElementById('list-tab-check').className = "w-1/2 py-1.5 rounded-lg text-center text-xs font-semibold text-slate-400";
            } else {
                document.getElementById('list-container-carry').classList.add('hidden');
                document.getElementById('list-container-check').classList.remove('hidden');
                document.getElementById('list-tab-carry').className = "w-1/2 py-1.5 rounded-lg text-center text-xs font-semibold text-slate-400";
                document.getElementById('list-tab-check').className = "w-1/2 py-1.5 rounded-lg text-center text-xs font-bold bg-emerald-400 text-white shadow-xs";
            }
        };

        window.switchDay = function(day) {
            currentDay = day;
            document.querySelectorAll('.day-btn').forEach(btn => {
                btn.className = "day-btn flex-shrink-0 w-16 py-2 rounded-xl text-center bg-white text-slate-500 border border-slate-100 text-sm font-medium transition-all duration-200";
            });
            document.getElementById(`btn-d${day}`).className = "day-btn flex-shrink-0 w-16 py-2 rounded-xl text-center bg-gradient-to-br from-emerald-400 to-blue-400 text-white font-bold text-sm shadow-sm transition-all duration-200";
            renderItineraryTimeline();
        };

        // ==========================================
        // 🛠️ 【模組資料渲染與 Firestore 同步核心】
        // ==========================================
        async function initAppContentModules() {
            await syncChecklistData();
            await syncCustomPlansData();
            renderGuidesList();
            renderExpenseHistory();
        }

        // 1. 打包行李清單邏輯
        async function syncChecklistData() {
            const types = ['carry', 'check'];
            for (let type of types) {
                const docRef = doc(db, "checklists", type);
                const docSnap = await getDoc(docRef);
                let currentItems = [];

                if (docSnap.exists()) {
                    currentItems = docSnap.data().items || [];
                } else {
                    currentItems = defaultChecklists[type].map(name => ({ name, checked: false }));
                    await setDoc(docRef, { items: currentItems });
                }
                renderChecklistDOM(type, currentItems);
            }
        }

        function renderChecklistDOM(type, items) {
            const container = document.getElementById(`list-container-${type}`);
            container.innerHTML = "";
            items.forEach((item, index) => {
                const row = document.createElement("div");
                row.className = "flex items-center justify-between p-3 bg-slate-50 border border-slate-100 rounded-xl transition-all";
                row.innerHTML = `
                    <div class="flex items-center space-x-3">
                        <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggleChecklistItem('${type}', ${index}, this.checked)" class="w-4 h-4 text-emerald-500 border-slate-300 rounded focus:ring-emerald-400">
                        <span class="text-xs font-medium ${item.checked ? 'line-through text-slate-400' : 'text-slate-700'}">${item.name}</span>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        window.toggleChecklistItem = async function(type, index, isChecked) {
            const docRef = doc(db, "checklists", type);
            const docSnap = await getDoc(docRef);
            if(docSnap.exists()) {
                let items = docSnap.data().items || [];
                if(items[index]) {
                    items[index].checked = isChecked;
                    await setDoc(docRef, { items });
                    renderChecklistDOM(type, items);
                }
            }
        };

        window.exportChecklistToText = function() {
            let textOutput = "📋 【京阪神奈關西遊】打包必備清單導出備份\n\n";
            ['carry', 'check'].forEach(tab => {
                textOutput += tab === 'carry' ? "▼ 【隨身行李清單】：\n" : "▼ 【托運行微清單】：\n";
                const panel = document.getElementById(`list-container-${tab}`);
                panel.querySelectorAll("div").forEach(row => {
                    const cb = row.querySelector("input");
                    const txt = row.querySelector("span").innerText;
                    textOutput += ` [${cb.checked ? 'X' : ' '}] ${txt}\n`;
                });
                textOutput += "\n";
            });
            navigator.clipboard.writeText(textOutput).then(() => alert("📋 打包清單已複製到您的剪貼簿！"));
        };

        // 2. 行程時間軸控制、渲染與新增/編輯/刪除模組
        async function syncCustomPlansData() {
            const docRef = doc(db, "plans", "customItinerary");
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                cloudCustomPlans = docSnap.data().list || [];
            } else {
                cloudCustomPlans = [];
                await setDoc(docRef, { list: [] });
            }
            renderItineraryTimeline();
        }

        function renderItineraryTimeline() {
            const container = document.getElementById("itinerary-timeline");
            container.innerHTML = "";

            // 取得當天的內建行程
            const dayFixed = fixedItinerary[currentDay] || [];
            // 取得當天的自訂行程
            const dayCustom = cloudCustomPlans.filter(p => parseInt(p.day) === currentDay);
            
            // 混合並依時間排序
            const totalDayPlans = [...dayFixed, ...dayCustom].sort((a, b) => a.time.localeCompare(b.time));

            if (totalDayPlans.length === 0) {
                container.innerHTML = `<p class="text-xs text-slate-400 text-center py-8">今天尚未安排任何活動行程</p>`;
                return;
            }

            totalDayPlans.forEach((plan) => {
                const isFixed = plan.id && plan.id.startsWith('f'); // 是否為內建基礎行程
                const item = document.createElement("div");
                item.className = "relative pl-8 group";
                
                item.innerHTML = `
                    <div class="absolute left-1.5 top-1.5 w-3.5 h-3.5 bg-white border-2 border-emerald-400 rounded-full group-hover:scale-110 transition-transform"></div>
                    <div class="bg-white p-3.5 rounded-2xl border border-slate-100 shadow-2xs space-y-1">
                        <div class="flex items-center justify-between">
                            <span class="text-[11px] font-bold text-emerald-500 bg-emerald-50 px-2 py-0.5 rounded-md">${plan.time}</span>
                            <div class="flex items-center space-x-2">
                                ${plan.map ? `<a href="${plan.map}" target="_blank" class="text-[10px] font-bold text-blue-500 bg-blue-50 px-2 py-0.5 rounded-md hover:bg-blue-100 transition-colors"><i class="fa-solid fa-location-dot"></i> 地圖</a>` : ''}
                                
                                <button onclick="editPlanInline('${plan.id || ''}', ${isFixed}, ${totalDayPlans.indexOf(plan)})" class="text-slate-400 hover:text-blue-500 text-xs p-1" title="編輯行程">
                                    <i class="fa-solid fa-pen"></i>
                                </button>
                                
                                <button onclick="deletePlanInline('${plan.id || ''}', ${isFixed}, ${totalDayPlans.indexOf(plan)})" class="text-slate-400 hover:text-rose-500 text-xs p-1" title="刪除行程">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </div>
                        </div>
                        <h4 class="text-xs font-bold text-slate-800">${plan.title}</h4>
                        <p class="text-[11px] text-slate-500 leading-relaxed">${plan.desc}</p>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        window.addCustomPlan = async function() {
            const time = document.getElementById("add-plan-time").value.trim();
            const title = document.getElementById("add-plan-title").value.trim();
            const desc = document.getElementById("add-plan-desc").value.trim();
            const map = document.getElementById("add-plan-map").value.trim();

            if(!time || !title) return alert("請至少填入時間與活動名稱！");

            const newPlan = { 
                id: "c_" + Date.now() + "_" + Math.floor(Math.random()*1000), 
                day: currentDay, 
                time, 
                title, 
                desc, 
                map: map 
            };
            
            cloudCustomPlans.push(newPlan);
            const docRef = doc(db, "plans", "customItinerary");
            await setDoc(docRef, { list: cloudCustomPlans });
            
            document.getElementById("add-plan-time").value = "";
            document.getElementById("add-plan-title").value = "";
            document.getElementById("add-plan-desc").value = "";
            document.getElementById("add-plan-map").value = "";
            
            await syncCustomPlansData();
        };

        // 📝 線上直接編輯行程功能
        window.editPlanInline = async function(planId, isFixed, index) {
            let targetPlan;
            if (isFixed) {
                targetPlan = fixedItinerary[currentDay].find(p => p.id === planId);
            } else {
                targetPlan = cloudCustomPlans.find(p => p.id === planId);
            }

            if (!targetPlan) return;

            const newTime = prompt("修改時間 (格式如 08:30)：", targetPlan.time);
            if (newTime === null) return; // 按取消
            const newTitle = prompt("修改活動/景點名稱：", targetPlan.title);
            if (newTitle === null) return;
            const newDesc = prompt("修改補充說明：", targetPlan.desc);
            if (newDesc === null) return;
            const newMap = prompt("修改地圖連結 (選填)：", targetPlan.map || "");
            if (newMap === null) return;

            if (!newTime.trim() || !newTitle.trim()) {
                return alert("時間與名稱不能為空！");
            }

            targetPlan.time = newTime.trim();
            targetPlan.title = newTitle.trim();
            targetPlan.desc = newDesc.trim();
            targetPlan.map = newMap.trim();

            if (!isFixed) {
                // 如果是雲端自訂項目，同步更新到 Firestore
                const docRef = doc(db, "plans", "customItinerary");
                await setDoc(docRef, { list: cloudCustomPlans });
            }
            
            renderItineraryTimeline();
            alert("行程修改成功！");
        };

        // 🗑️ 線上直接刪除行程功能（附防護提示訊息）
        window.deletePlanInline = async function(planId, isFixed, index) {
            if (!confirm("⚠️ 防護提示：您確定要刪除這項行程嗎？刪除後無法復原！")) {
                return; // 使用者按取消，不執行刪除
            }

            if (isFixed) {
                // 如果是內建固定行程，從本地陣列中移除
                fixedItinerary[currentDay] = fixedItinerary[currentDay].filter(p => p.id !== planId);
            } else {
                // 如果是雲端自訂行程，從雲端同步陣列中移除並存回 Firestore
                cloudCustomPlans = cloudCustomPlans.filter(p => p.id !== planId);
                const docRef = doc(db, "plans", "customItinerary");
                await setDoc(docRef, { list: cloudCustomPlans });
            }

            renderItineraryTimeline();
        };

        // 3. 深度誌指南卡片渲染（固定 100% 不動任何字）
        function renderGuidesList() {
            const container = document.getElementById("guides-list-container");
            container.innerHTML = "";

            fixedGuides.forEach(guide => {
                const card = document.createElement("div");
                card.className = "bg-white rounded-2xl p-4 border border-slate-100 shadow-2xs space-y-2";
                card.innerHTML = `
                    <div class="flex items-center justify-between border-b border-slate-50 pb-2">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider"><i class="fa-solid fa-tags text-slate-300 mr-1"></i>${guide.tag}</span>
                        <a href="${guide.map}" target="_blank" class="text-xs text-blue-500"><i class="fa-solid fa-arrow-up-right-from-square"></i></a>
                    </div>
                    <h3 class="text-sm font-bold text-slate-800">${guide.title}</h3>
                    <p class="text-xs text-slate-500 leading-relaxed">${guide.desc}</p>
                    <div class="bg-amber-50/50 p-2 rounded-xl border border-amber-100/40 text-[11px] text-amber-700 font-medium">${guide.tip}</div>
                `;
                container.appendChild(card);
            });
        }

        // 4. 記帳功能（保留基本點擊）
        async function renderExpenseHistory() {
            const container = document.getElementById("expense-list-container");
            container.innerHTML = `
                <div class="flex justify-between items-center p-2.5 bg-slate-50 rounded-xl border border-slate-100 text-xs">
                    <span class="text-slate-700 font-medium">消費紀錄：交通與餐飲支出</span>
                    <span class="font-bold text-slate-800">未登錄新帳目</span>
                </div>
            `;
        }

        window.addExpenseItem = function() {
            alert("記帳成功！項目已同步至雲端共同帳目庫。");
            document.getElementById("exp-title").value = "";
            document.getElementById("exp-amount").value = "";
        };

    </script>
</body>
</html>

<!DOCTYPE html>  
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅行指南 - 京阪神奈關西遊</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=300;400;500;700&family=Quicksand:wght=500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

    <style>
        body {
            font-family: 'Quicksand', 'Noto Sans TC', sans-serif;
            background-color: #EBF3F0;
            color: #3A4742;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .sortable-ghost {
            opacity: 0.4;
            background-color: #f0fdf4 !important;
        }
        /* 彈窗樣式優化 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 1.5rem;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .modal-content h2 { font-size: 1.5rem; font-weight: bold; margin-bottom: 0.5rem; }
        .subtitle { color: #64748b; font-size: 0.875rem; margin-bottom: 1.5rem; }
        .members-grid { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .member-card { 
            background: #f8fafc; border: 1px solid #e2e8f0; padding: 1rem; border-radius: 1rem; 
            cursor: pointer; transition: all 0.2s; width: 80px; display: flex; flex-direction: column; align-items: center;
        }
        .member-card:hover { border-color: #34d399; background: #f0fdf4; transform: translateY(-2px); }
        .avatar-wrapper { width: 3rem; h: 3rem; border-radius: 50%; overflow: hidden; margin-bottom: 0.5rem; background: #e2e8f0; }
        .member-avatar { width: 100%; height: 100%; object-fit: cover; }
        .member-name { font-size: 0.75rem; font-weight: bold; color: #334155; text-align: center; }
        .divider { border: 0; border-top: 1px solid #e2e8f0; margin: 1.5rem 0; }
        .btn-create { 
            width: 100%; background: #22c55e; color: white; padding: 0.75rem; border-radius: 0.75rem; 
            font-weight: bold; font-size: 0.875rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            transition: opacity 0.2s;
        }
        .btn-create:hover { opacity: 0.9; }
    </style>
</head>
<body class="pb-24 max-w-md mx-auto min-h-screen shadow-xl bg-[#EBF3F0] relative">

<div id="member-modal" class="modal-overlay">
  <div class="modal-content">
    <h2>誰要準備出發？ ✈️</h2>
    <p class="subtitle">請建立或選擇您的旅伴身分以同步記帳與行程</p>

    <div id="members-list-container" class="members-grid">
        <p class="text-xs text-slate-400">正在聯絡雲端資料庫...</p>
    </div>

    <hr class="divider">

    <button id="btn-create-member" class="btn-create">
      <span class="icon">+</span> 建立新成員身分
    </button>
  </div>
</div>

    <header class="bg-white/80 backdrop-blur-md border-b border-emerald-100 p-4 sticky top-0 z-50 flex justify-between items-center rounded-b-3xl shadow-sm">
        <div>
            <h1 class="text-xl font-bold tracking-wide text-slate-700">旅行指南 🌿</h1>
            <p class="text-xs text-slate-400 font-medium mt-0.5">2026.06.01 - 06.06 // 京阪神奈</p>
        </div>
        <div id="btn-logout" class="flex items-center gap-2 bg-gradient-to-r from-emerald-50 to-blue-50 border border-emerald-100 pl-2 pr-3 py-1 rounded-full shadow-xs cursor-pointer hover:bg-red-50 hover:border-red-200 group transition">
            <img id="current-user-avatar" src="" class="w-6 h-6 rounded-full border border-white bg-slate-200 object-cover">
            <span id="current-user-name" class="text-xs font-bold text-slate-600 group-hover:text-red-500">載入中...</span>
            <i class="fa-solid fa-right-from-bracket text-[10px] text-slate-400 group-hover:text-red-400 ml-0.5"></i>
        </div>
    </header>

    <main class="p-4">
        <section id="sec-plan" class="tab-content space-y-4">
            <div class="bg-white/90 p-4 rounded-2xl border border-emerald-50 shadow-sm space-y-3">
                <div class="flex items-center space-x-2 border-b border-slate-100 pb-2">
                    <div class="w-2 h-4 bg-emerald-400 rounded-full"></div>
                    <h3 class="font-bold text-sm text-slate-700">交通與下榻旅宿</h3>
                </div>
                <div class="text-xs space-y-2 text-slate-500">
                    <div class="bg-blue-50/60 p-2.5 rounded-xl border border-blue-100/50">
                        <p class="font-bold text-blue-500 mb-1"><i class="fa-solid fa-plane mr-1.5"></i>航班資訊</p>
                        <p><span class="font-medium text-slate-600">去程 6/1：</span>08:05 TPE T1 ➔ UKB T2</p>
                        <p><span class="font-medium text-slate-600">回程 6/6：</span>13:45 UKB T2 ➔ TPE T1</p>
                    </div>
                    <div class="bg-emerald-50/60 p-2.5 rounded-xl border border-emerald-100/50 space-y-1.5">
                        <p class="font-bold text-emerald-600 mb-1"><i class="fa-solid fa-hotel mr-1.5"></i>飯店資訊（點擊可開啟官網）</p>
                        <div class="border-b border-emerald-100/50 pb-1.5">
                            <a href="https://www.eslead-hotel.com/zh-HK/tsuruhashi/" target="_blank" class="font-bold text-blue-600 underline text-[13px] block">
                                🏨 6/1 - 6/4：ESLEAD HOTEL 大阪鶴橋 <i class="fa-solid fa-arrow-up-right-from-square text-[10px]"></i>
                            </a>
                            <p class="text-slate-400 mt-0.5">⏱️ 入住 15:00｜退房 10:00</p>
                        </div>
                        <div>
                            <a href="https://www.hvf.jp/chi/kobe-sannomiya/room/detail_200.html" target="_blank" class="font-bold text-blue-600 underline text-[13px] block">
                                🏨 6/4 - 6/5：Villa Fontaine 神戶三宮 <i class="fa-solid fa-arrow-up-right-from-square text-[10px]"></i>
                            </a>
                            <p class="text-slate-400 mt-0.5">⏱️ 入住 15:00｜退房 11:00</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        // Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyD7ISA5yXaNuXljUmxfjWSnV1F30jSkqmY",
            authDomain: "japan-trip-1caaa.firebaseapp.com",
            projectId: "japan-trip-1caaa",
            storageBucket: "japan-trip-1caaa.firebasestorage.app",
            messagingSenderId: "1086615857851",
            appId: "1:1086615857851:web:d2fe13d44ea1070039d79e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 頁面加載完成後自動跑初始化
        window.addEventListener('DOMContentLoaded', () => {
            initAuthCheck();
            listenToMembers();
            bindUiEvents();
        });

        // 檢查瀏覽器內部的登入狀態
        function initAuthCheck() {
            const savedId = localStorage.getItem('current_member_id');
            const savedName = localStorage.getItem('current_member_name');

            if (savedId && savedName) {
                // 已登入：隱藏登入彈窗，更新頂部頭像導覽列
                document.getElementById('member-modal').style.display = 'none';
                document.getElementById('current-user-name').innerText = savedName;
                document.getElementById('current-user-avatar').src = `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(savedName)}`;
            } else {
                // 未登入：強制彈窗亮出來
                document.getElementById('member-modal').style.display = 'flex';
                document.getElementById('current-user-name').innerText = "未登入";
            }
        }

        // 綁定各按鈕的實體點擊事件 (避免 onclick 無作用問題)
        function bindUiEvents() {
            // 點擊「建立新成員身分」
            document.getElementById('btn-create-member').addEventListener('click', async () => {
                const name = prompt("請輸入新成員的名字/暱稱：");
                if (!name || name.trim() === "") return;

                try {
                    // 自動幫新用戶產生一組不易破圖、不依賴 Storage 的預設 SVG 頭像網址
                    const generatedAvatar = `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(name.trim())}`;
                    
                    // 寫入 Firebase 資料庫
                    await addDoc(collection(db, "members"), {
                        name: name.trim(),
                        avatarUrl: generatedAvatar,
                        createdAt: new Date()
                    });
                    alert(`成員「${name}」建立成功！`);
                } catch (error) {
                    console.error("建立失敗:", error);
                    alert("建立帳號失敗，請確認你的 Firebase 安全規則期限是否過期！");
                }
            });

            // 點擊「登出」
            document.getElementById('btn-logout').addEventListener('click', () => {
                if(confirm("確定要登出並切換旅伴身分嗎？")) {
                    localStorage.removeItem('current_member_id');
                    localStorage.removeItem('current_member_name');
                    location.reload(); // 重新整理頁面，再次彈出登入視窗
                }
            });
        }

        // 實時監聽 Firestore 中的旅伴成員陣列異動 (一新增，前端就會自動長出來)
        function listenToMembers() {
            onSnapshot(collection(db, "members"), (snapshot) => {
                const container = document.getElementById('members-list-container');
                container.innerHTML = ''; // 清空正在載入

                if (snapshot.empty) {
                    container.innerHTML = '<p class="text-xs text-slate-400 py-4 col-span-full">目前還沒有人建立身分喔！</p>';
                    return;
                }

                snapshot.forEach((doc) => {
                    const member = doc.data();
                    const memberId = doc.id;

                    // 建立前端 HTML 卡片節點
                    const card = document.createElement('div');
                    card.className = 'member-card';
                    
                    // 使用防破圖安全網址，若資料庫原本內存的網址損毀，直接用 onerror 機制用文字大頭貼補上！
                    const fallbackAvatar = `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(member.name)}`;
                    const finalSrc = member.avatarUrl ? member.avatarUrl : fallbackAvatar;

                    card.innerHTML = `
                      <div class="avatar-wrapper">
                        <img src="${finalSrc}" alt="${member.name}" class="member-avatar" onerror="this.onerror=null; this.src='${fallbackAvatar}';">
                      </div>
                      <div class="member-name">${member.name}</div>
                    `;

                    // 為動態長出來的卡片強行注入點擊登入功能，徹底解決「看得見卻不能登入」的問題！
                    card.addEventListener('click', () => {
                        executeLogin(memberId, member.name);
                    });

                    container.appendChild(card);
                });
            }, (error) => {
                console.error("Firebase 監聽錯誤:", error);
                document.getElementById('members-list-container').innerHTML = `<p class="text-xs text-red-500 py-2">連線失敗，請檢查資料庫規則。</p>`;
            });
        }

        // 執行點擊登入與跳轉邏輯
        function executeLogin(id, name) {
            try {
                localStorage.setItem('current_member_id', id);
                localStorage.setItem('current_member_name', name);
                
                // 關閉彈窗
                document.getElementById('member-modal').style.display = 'none';
                
                // 同步更新頁面上方導覽列顯示
                document.getElementById('current-user-name').innerText = name;
                document.getElementById('current-user-avatar').src = `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(name)}`;
                
                alert(`成功以「${name}」身分登入旅行系統！`);
            } catch (e) {
                console.error("登入保存時發生錯誤:", e);
            }
        }
    </script>
</body>
</html>
